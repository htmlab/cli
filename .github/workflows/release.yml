name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun test

  build:
    needs: test
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            archive: polar-darwin-arm64.zip
            os: macos-15
          - target: bun-darwin-x64
            archive: polar-darwin-x64.zip
            os: macos-15
          - target: bun-linux-x64
            archive: polar-linux-x64.tar.gz
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build binary
        run: bun build ./src/cli.ts --compile --target=${{ matrix.target }} --outfile polar

      - name: Package binary
        run: |
          if [[ "${{ matrix.archive }}" == *.zip ]]; then
            ditto -c -k --keepParent polar "${{ matrix.archive }}"
          else
            tar -czf "${{ matrix.archive }}" polar
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum *.tar.gz *.zip > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip
            checksums.txt
          generate_release_notes: true
